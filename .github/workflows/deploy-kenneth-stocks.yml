name: Deploy kenneth-stocks to Hetzner

on:
  push:
    branches:
      - claude/trading-bot-setup-Ekh2i
      - master
    paths:
      - 'kenneth-stocks/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            REPO_URL="https://github.com/kenneth359/kenneth-andersen.git"
            BRANCH="claude/trading-bot-setup-Ekh2i"
            DEPLOY_DIR="/opt/kenneth-stocks"

            if [ -d "$DEPLOY_DIR/.git" ]; then
              cd "$DEPLOY_DIR"
              git fetch origin
              git checkout "$BRANCH"
              git pull origin "$BRANCH"
            else
              git clone -b "$BRANCH" "$REPO_URL" "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR/kenneth-stocks"

            # Create .env if it doesn't exist yet
            if [ ! -f .env ]; then
              echo "ERROR: .env file missing. Please create it from .env.example and fill in API keys."
              echo "Run: nano $DEPLOY_DIR/kenneth-stocks/.env"
              exit 1
            fi

            docker compose up -d --build
            echo "Deploy complete! kenneth-stocks is running."
